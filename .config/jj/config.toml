[user]
name = "Darren Clark"
email = "darrenjoelclark@icloud.com"

[ui]
default-command = "log"
merge-editor = "mergiraf"

[aliases]
ab = ["abandon"]
abs = ["absorb"]
e = ["edit"]
ed = ["edit"]
g = ["git"]
gf = ["git", "fetch"]
gp = ["git", "push", "--allow-new"]
rb = ["rebase"]
rs = ["restore"]
res = ["restore"]
sp = ["split"]
sq = ["squash"]
d = ["desc"]
dup = ["duplicate"]
el = ["evolog", "-p"]
n = ["new"]
showdesc = ["log", "--no-graph", "--template", "description", "-r"]
tug = ["bookmark", "move", "--from", "heads(::@- & bookmarks())", "--to", "@-"]
diffp = ["diff", "-r", "@-"]  # "diff parent"
pr = ["util", "exec", "--", "bash", "-c", """
REV="${1:-@}"
REMOTE_URL=$(jj --ignore-working-copy git remote list | head -1 | awk '{print $2}' | sed 's/\\.git$//' | sed 's|git@github.com:|https://github.com/|')
BOOKMARK=$(jj --ignore-working-copy log -r "$REV" --no-graph -T 'bookmarks.map(|b| b.name()).join(" ")' 2>/dev/null | awk '{print $1}')
PARENT_BOOKMARK=$(jj --ignore-working-copy log -r "$REV-" --no-graph -T 'bookmarks.map(|b| b.name()).join(" ")' 2>/dev/null | awk '{print $1}')
if [ -z "$BOOKMARK" ]; then
  HEAD=$(jj --ignore-working-copy log -r "$REV" --no-graph -T 'commit_id.short(12)')
else
  HEAD="$BOOKMARK"
fi
if [ -z "$PARENT_BOOKMARK" ]; then
  BASE=$(jj --ignore-working-copy log -r "$REV-" --no-graph -T 'commit_id.short(12)')
else
  BASE="$PARENT_BOOKMARK"
fi
URL="${REMOTE_URL}/compare/${BASE}...${HEAD}?expand=1"
echo "$URL"
open "$URL"
""", ""]

[revsets]
log = 'present(@) | ancestors(immutable_heads().., 2) | present(trunk()) | (mine() & bookmarks())'

[revset-aliases]
rebaseable = 'mine() & (mutable() ~ remote_bookmarks()) & immutable()+'

[templates]
git_push_bookmark = '"darrenclark/" ++ description.first_line().replace(regex:"[^a-zA-Z0-9_-]+", "-").replace(regex:"-+", "-").replace(regex:"^-+|-+$", "")'

draft_commit_description = '''
concat(
  builtin_draft_commit_description,
  "\nJJ: Has these parents:\n",
  parents.map(|c| "JJ:   " ++ c.commit_id().short() ++ "  " ++ c.description().first_line()).join("\n"),
  "\n\nJJ: ignore-rest\n",
  diff.git(),
)
'''
